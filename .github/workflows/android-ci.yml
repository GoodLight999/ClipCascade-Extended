name: Android reliability CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out extension repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Materialize pinned upstream and validate architecture
        shell: bash
        run: |
          set -o pipefail
          chmod +x scripts/materialize_upstream.sh
          ./scripts/materialize_upstream.sh 2>&1 | tee materialize.log

      - name: Restore stable APK signing key
        run: |
          base64 --decode ci/clipcascade-extended.keystore.b64 \
            > build/mobile/android/app/clipcascade-extended.keystore
          keytool -list -keystore build/mobile/android/app/clipcascade-extended.keystore \
            -storepass clipcascade-extended -alias clipcascade-extended

      - name: Install JavaScript dependencies
        working-directory: build/mobile
        run: npm ci

      - name: Scope React Native snapshot repository
        run: |
          python3 scripts/patch_react_native_snapshot_repository.py build/mobile

      - name: Audit injected Gradle repositories
        working-directory: build/mobile
        shell: bash
        run: |
          set -euo pipefail
          {
            echo '=== central.sonatype snapshot references ==='
            grep -R -n -I --exclude='*.map' \
              'central.sonatype.com/repository/maven-snapshots' \
              android node_modules || true
            echo '=== snapshot content filters ==='
            grep -R -n -I --exclude='*.map' \
              -E 'includeGroup\("com[.]facebook[.](react|hermes)"\)' \
              node_modules/@react-native/gradle-plugin || true
          } | tee gradle-repository-audit.txt
          grep -Fq 'includeGroup("com.facebook.react")' gradle-repository-audit.txt
          grep -Fq 'includeGroup("com.facebook.hermes")' gradle-repository-audit.txt

      - name: Lint JavaScript and TypeScript
        working-directory: build/mobile
        shell: bash
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee lint.log

      - name: Run JavaScript tests
        working-directory: build/mobile
        shell: bash
        run: |
          set -o pipefail
          npm test -- --runInBand 2>&1 | tee jest.log

      - name: Run Android lint, unit tests, and standalone build
        working-directory: build/mobile/android
        shell: bash
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew --no-daemon --stacktrace --warning-mode all \
            lintExtended testExtendedUnitTest assembleExtended 2>&1 | tee ../gradle-build.log

      - name: Validate APK structure, signature, and checksum
        shell: bash
        run: |
          set -euo pipefail
          apk="build/mobile/android/app/build/outputs/apk/extended/app-extended.apk"
          test -s "$apk"

          unzip -t "$apk" | tee apk-zip-test.txt

          zipalign="$(find "$ANDROID_HOME/build-tools" -type f -name zipalign | sort -V | tail -n 1)"
          apksigner="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          apkanalyzer="$(find "$ANDROID_HOME/cmdline-tools" -type f -name apkanalyzer | sort -V | tail -n 1)"
          test -x "$zipalign"
          test -x "$apksigner"
          test -x "$apkanalyzer"

          "$zipalign" -c -v 4 "$apk" | tee apk-zipalign.txt
          "$apksigner" verify --verbose --print-certs "$apk" | tee apk-signature.txt
          "$apkanalyzer" manifest print "$apk" | tee apk-manifest.xml

          grep -Fq 'package="com.clipcascade.extended"' apk-manifest.xml
          grep -Fq 'android:versionCode="320004"' apk-manifest.xml
          grep -Fq 'android:versionName="3.2.0-extended.4"' apk-manifest.xml
          grep -Fq 'com.clipcascade.ClipCascadeAccessibilityService' apk-manifest.xml
          grep -Fq 'android.permission.BIND_ACCESSIBILITY_SERVICE' apk-manifest.xml
          grep -Fq 'android.permission.READ_LOGS' apk-manifest.xml
          grep -Fq 'android.permission.SYSTEM_ALERT_WINDOW' apk-manifest.xml
          grep -Fq 'moe.shizuku.manager.permission.API_V23' apk-manifest.xml
          grep -Fq 'moe.shizuku.client.V3_SUPPORT' apk-manifest.xml
          grep -Fq 'moe.shizuku.privileged.api' apk-manifest.xml
          ! grep -Fq 'NotificationCaptureService' apk-manifest.xml
          ! grep -Fq 'BIND_NOTIFICATION_LISTENER_SERVICE' apk-manifest.xml
          if grep -Fq 'android:debuggable="true"' apk-manifest.xml; then
            echo 'Extended APK must not be debuggable' >&2
            exit 1
          fi

          : > apk-dex-strings.txt
          while IFS= read -r dex; do
            unzip -p "$apk" "$dex" | strings >> apk-dex-strings.txt
          done < <(zipinfo -1 "$apk" | grep -E '^classes([0-9]+)?[.]dex$')
          grep -Fq 'selection-without-copy' apk-dex-strings.txt
          grep -Fq 'capture-timeout' apk-dex-strings.txt
          grep -Fq 'activity-destroyed-before-capture' apk-dex-strings.txt
          grep -Fq 'retry-scheduled' apk-dex-strings.txt
          grep -Fq 'one-time-setup-only' apk-dex-strings.txt
          grep -Fq 'ClipCascade-ShizukuSetup' apk-dex-strings.txt
          grep -Fq 'addBinderReceivedListenerSticky' apk-dex-strings.txt
          grep -Fq 'ReliabilityAutoDebug' apk-dex-strings.txt
          grep -Fq 'ForegroundRuntimeRecovery' apk-dex-strings.txt
          grep -Fq 'com.clipcascade.CAPTURE_RECOVERY' apk-dex-strings.txt
          grep -Fq 'foreground_service_recovery_status' apk-dex-strings.txt
          grep -Fq 'foreground_service_error' apk-dex-strings.txt
          grep -Fq 'p2p_incompatible_peers' apk-dex-strings.txt
          grep -Fq 'activateAndDrain' apk-dex-strings.txt
          grep -Fq 'drainInOrder' apk-dex-strings.txt
          ! grep -Fq 'NotificationCaptureService' apk-dex-strings.txt
          ! grep -Fq 'OtpExtractor' apk-dex-strings.txt

          unzip -p "$apk" assets/index.android.bundle > apk-js-bundle.txt
          test -s apk-js-bundle.txt
          grep -Fq 'ready-after-registration' apk-js-bundle.txt
          grep -Fq 'duplicate-runtime-suppressed' apk-js-bundle.txt
          grep -Fq 'foreground_service_loop_failed_at' apk-js-bundle.txt
          grep -Fq 'service-started-for-share' apk-js-bundle.txt
          grep -Fq 'notificationConnectionRestored' apk-js-bundle.txt
          grep -Fq 'diagnosticsOverall' apk-js-bundle.txt
          grep -Fq 'diagnosticRecovery' apk-js-bundle.txt
          grep -Fq 'notificationDownloadFiles' apk-js-bundle.txt
          grep -Fq 'checkingService' apk-js-bundle.txt
          ! grep -Fq 'New version available!' apk-js-bundle.txt
          ! grep -Fq 'raw.githubusercontent.com/Sathvik-Rao/ClipCascade/main/version.json' apk-js-bundle.txt
          ! grep -Fq 'raw.githubusercontent.com/Sathvik-Rao/ClipCascade/main/metadata.json' apk-js-bundle.txt

          mkdir -p dist
          cp "$apk" dist/ClipCascade-Extended.apk
          sha256sum dist/ClipCascade-Extended.apk | tee dist/ClipCascade-Extended.apk.sha256

      - name: Upload installable APK
        uses: actions/upload-artifact@v4
        with:
          name: ClipCascade-Extended-${{ github.sha }}
          path: |
            dist/ClipCascade-Extended.apk
            dist/ClipCascade-Extended.apk.sha256
            apk-signature.txt
            apk-manifest.xml
            apk-zip-test.txt
            apk-zipalign.txt
            apk-dex-strings.txt
            apk-js-bundle.txt
            build/mobile/gradle-repository-audit.txt
            materialize.log
          if-no-files-found: error
          retention-days: 30

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ClipCascade-Extended-failure-reports-${{ github.sha }}
          path: |
            materialize.log
            build/mobile/lint.log
            build/mobile/jest.log
            build/mobile/gradle-build.log
            build/mobile/gradle-repository-audit.txt
            build/mobile/App.js
            build/mobile/StartForegroundService.js
            build/mobile/ExtendedControlPanel.js
            build/mobile/ExtendedI18n.js
            build/mobile/AutoDebug.js
            build/mobile/P2PCompatibility.js
            build/mobile/android/app/build.gradle
            build/mobile/android/app/src/main/AndroidManifest.xml
            build/mobile/android/app/src/main/java/com/clipcascade/NativeBridgeModule.kt
            build/mobile/android/app/src/main/java/com/clipcascade/ClipCascadeAccessibilityService.kt
            build/mobile/android/app/src/main/java/com/clipcascade/ShizukuSetup.kt
            build/mobile/android/app/src/main/java/com/clipcascade/ReliabilityAutoDebug.kt
            build/mobile/android/app/src/main/java/com/clipcascade/ForegroundRuntimeRecovery.kt
            build/mobile/android/app/build/reports/**
            build/mobile/android/build/reports/**
            apk-signature.txt
            apk-manifest.xml
            apk-zip-test.txt
            apk-zipalign.txt
            apk-dex-strings.txt
            apk-js-bundle.txt
            build/mobile/npm-debug.log
          if-no-files-found: ignore
          retention-days: 14

  emulator-smoke:
    name: Emulator smoke API ${{ matrix.api-level }}
    needs: build-android
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        api-level: [35, 36]

    steps:
      - name: Download signed APK artifact
        uses: actions/download-artifact@v4
        with:
          name: ClipCascade-Extended-${{ github.sha }}
          path: artifact

      - name: Verify downloaded APK checksum
        shell: bash
        run: |
          set -euo pipefail
          cd artifact
          sha256sum -c dist/ClipCascade-Extended.apk.sha256

      - name: Enable KVM
        shell: bash
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install and exercise release APK
        uses: ReactiveCircus/android-emulator-runner@1dcd0090116d15e7c562f8db72807de5e036a4ed
        with:
          api-level: ${{ matrix.api-level }}
          target: google_apis
          arch: x86_64
          profile: pixel_6
          cores: 2
          ram-size: 4096M
          heap-size: 512M
          disable-animations: true
          emulator-options: >-
            -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
            -camera-back none -camera-front none
          script: |
            set -euo pipefail
            package='com.clipcascade.extended'
            component='com.clipcascade.extended/com.clipcascade.MainActivity'
            api='${{ matrix.api-level }}'
            out="emulator-smoke/api-${api}"
            mkdir -p "$out"

            adb logcat -c
            adb install -r artifact/dist/ClipCascade-Extended.apk \
              | tee "$out/install.txt"
            adb shell pm path "$package" | tee "$out/package-path.txt"
            adb shell dumpsys package "$package" > "$out/package.txt"
            grep -Fq 'com.clipcascade.ClipCascadeAccessibilityService' "$out/package.txt"
            grep -Fq 'com.clipcascade.BootReceiver' "$out/package.txt"

            adb shell cmd uimode night no || true
            adb shell am force-stop "$package"
            adb shell am start -W -n "$component" | tee "$out/launch-light.txt"
            grep -Fq 'Status: ok' "$out/launch-light.txt"
            sleep 4

            adb shell am start -W \
              -a android.intent.action.SEND \
              -t text/plain \
              --es android.intent.extra.TEXT "ClipCascade CI share API ${api}" \
              -n "$component" | tee "$out/share-text.txt"
            grep -Fq 'Status: ok' "$out/share-text.txt"
            sleep 2

            adb shell am start -W \
              -a android.intent.action.PROCESS_TEXT \
              -t text/plain \
              --es android.intent.extra.PROCESS_TEXT "ClipCascade CI process text API ${api}" \
              -n "$component" | tee "$out/process-text.txt"
            grep -Fq 'Status: ok' "$out/process-text.txt"
            sleep 2

            adb shell cmd uimode night yes || true
            adb shell am force-stop "$package"
            adb shell am start -W -n "$component" | tee "$out/launch-dark.txt"
            grep -Fq 'Status: ok' "$out/launch-dark.txt"
            sleep 4

            pid="$(adb shell pidof "$package" | tr -d '\r')"
            test -n "$pid"
            printf '%s\n' "$pid" > "$out/pid.txt"
            adb exec-out screencap -p > "$out/dark-mode.png"
            adb shell dumpsys activity exit-info "$package" > "$out/exit-info.txt" || true
            adb logcat -d -v threadtime > "$out/logcat.txt"

            if grep -Fq 'Process: com.clipcascade.extended' "$out/logcat.txt"; then
              echo 'ClipCascade process crash detected in emulator logcat' >&2
              exit 1
            fi
            if grep -Fq 'ANR in com.clipcascade.extended' "$out/logcat.txt"; then
              echo 'ClipCascade ANR detected in emulator logcat' >&2
              exit 1
            fi
            if grep -Eq 'reason=REASON_(CRASH|CRASH_NATIVE|ANR)' "$out/exit-info.txt"; then
              echo 'ClipCascade abnormal exit detected by ActivityManager' >&2
              exit 1
            fi

      - name: Upload emulator evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ClipCascade-Extended-emulator-api-${{ matrix.api-level }}-${{ github.sha }}
          path: emulator-smoke/api-${{ matrix.api-level }}/**
          if-no-files-found: warn
          retention-days: 30
